name: Build & Deploy Outdoor Index

on:
  push:
    branches: [main]
  workflow_dispatch: {}
  schedule:
    - cron: "0 23 * * *"   # 07:00 HKT daily — redeploy heartbeat (data itself is live per-request)

permissions:
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run build

      # First run creates the Pages project; harmless "already exists" after.
      - name: Ensure Pages project exists
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create hk-outdoor-index --production-branch=main

      # Deploys dist/ + the ./functions directory (the /api/today endpoint).
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=hk-outdoor-index --branch=main
